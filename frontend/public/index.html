<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#1e6b6b" />
        <meta name="description" content="LocalDrift — discover everything happening near Wilmington, NC. Events, restaurants, food trucks, parks, fitness, activities, churches, and local news in one place." />
        <meta name="keywords" content="Wilmington NC, local events, things to do Wilmington, restaurants Wilmington NC, food trucks, Wrightsville Beach, Carolina Beach" />
        <meta name="author" content="LocalDrift" />
        <link rel="canonical" href="https://www.localdrift.app/" />

        <!-- Open Graph / Facebook (used when someone shares a localdrift.app link) -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="LocalDrift" />
        <meta property="og:url" content="https://www.localdrift.app/" />
        <meta property="og:title" content="LocalDrift — Local discovery for Wilmington, NC" />
        <meta property="og:description" content="Discover everything happening near Wilmington, NC — events, restaurants, food trucks, parks, fitness, and activities all in one place. Free during beta." />
        <meta property="og:image" content="https://www.localdrift.app/logo.png" />
        <meta property="og:image:width" content="512" />
        <meta property="og:image:height" content="512" />
        <meta property="og:image:alt" content="LocalDrift logo" />
        <meta property="og:locale" content="en_US" />

        <!-- Twitter / X cards -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="LocalDrift — Local discovery for Wilmington, NC" />
        <meta name="twitter:description" content="Discover everything happening near Wilmington, NC. Events, restaurants, food trucks, parks, fitness, and activities all in one place. Free during beta." />
        <meta name="twitter:image" content="https://www.localdrift.app/logo.png" />

        <!-- Favicons. Multiple sizes so each surface picks the best:
             - 16/32 for browser tabs
             - 96 is Google's preferred favicon-in-search size
             - 192 is the largest, used by Android Chrome + Google when
               it wants to render the result thumbnail at higher DPI -->
        <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
        <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="96x96" href="%PUBLIC_URL%/favicon-96x96.png" />
        <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/android-chrome-192x192.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
        <link rel="manifest" href="%PUBLIC_URL%/site.webmanifest" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <title>LocalDrift — Local discovery for Wilmington, NC</title>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
